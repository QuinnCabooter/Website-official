{{ define "main" }}
<section class="section">
  <div class="container narrow {{ if eq .Params.pageType "contact" }}section-title-wrap{{ end }}">
    {{/* Optional page icon: set `title_icon` in front matter for per-page customization */}}
    {{ if eq .Params.pageType "contact" }}
      <img
        class="section-title-icon"
        src="{{ .Params.title_icon | default site.Data.profile.portrait }}"
        alt=""
        aria-hidden="true"
      />
    {{ end }}
    <h1>{{ .Title }}</h1>
    {{ if .Content }}<div>{{ .Content }}</div>{{ end }}
  </div>
</section>
{{ end }}
