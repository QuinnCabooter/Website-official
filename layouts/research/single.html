{{ define "main" }}
<section class="section">
  <div class="container narrow section-title-wrap">
    <img
      class="section-title-icon"
      src="{{ .Params.title_icon | default site.Data.profile.research_portrait | default site.Data.profile.portrait }}"
      alt=""
      aria-hidden="true"
    />
    {{ partial "page_title.html" (dict "ctx" . "title" .Title "subtitle" (.Date.Format "Jan 2, 2006")) }}
    {{ if .Content }}<div>{{ .Content }}</div>{{ end }}
  </div>
</section>
{{ end }}
