<header class="site-header">
  <nav class="container nav">
    <a class="brand" href="/">{{ .Site.Params.author }}</a>
    <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">Menu</button>
    <ul id="nav-list" class="nav-list">
      {{ $p := .RelPermalink }}
      <li><a href="/" {{ if eq $p "/" }}aria-current="page"{{ end }}>About</a></li>
      <li>
        <a href="/research/" {{ if or (hasPrefix $p "/research/") (eq $p "/research/") }}aria-current="page"{{ end }}>Research</a>
      </li>
      <li>
        <a href="/publications/" {{ if or (hasPrefix $p "/publications/") (eq $p "/publications/") }}aria-current="page"{{ end }}>Publications</a>
      </li>
      <li>
        <a href="/experience/" {{ if or (hasPrefix $p "/experience/") (eq $p "/experience/") }}aria-current="page"{{ end }}>Experience</a>
      </li>
      <li>
        <a href="/conferences/" {{ if or (hasPrefix $p "/conferences/") (eq $p "/conferences/") }}aria-current="page"{{ end }}>Conferences</a>
      </li>
      <li><a href="/contact/" {{ if eq $p "/contact/" }}aria-current="page"{{ end }}>Contact</a></li>
    </ul>
  </nav>
</header>
