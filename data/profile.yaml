bio_intro: "Hi! My name is Quinn Cabooter, and I am a doctoral researcher at imec-mict-UGent."
eyebrow: "Human-Computer Interaction | Cognitive Neuroscience | Mid-air haptics"
headline: "How do we perceive and interact with ultrasound mid-air haptics?"
lead: "My research focuses on objective evaluation methods for mid-air haptics, combining behavioral experiments with physiological measures. I hold a MSc. in Theoretical and Experimental Psychology (Ghent University), and I am currently a doctoral researcher at imec-mict-UGent studying the perception and interaction with ultrasound mid-air haptics. This website provides an overview of my current research, publications, and ongoing work."
